version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lingua-postgres
    environment:
      POSTGRES_USER: lingua
      POSTGRES_PASSWORD: lingua_dev_password
      POSTGRES_DB: lingua
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
